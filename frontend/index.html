<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>İzin Talebi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-4 text-center">İzin Talep Formu</h3>

    <input id="ad" class="form-control mb-3" placeholder="Ad Soyad">

    <select id="tur" class="form-select mb-3">
      <option>Yıllık İzin</option>
      <option>Sağlık İzni</option>
      <option>Mazeret</option>
    </select>

    <div class="row mb-3">
      <div class="col">
        <label>Başlangıç</label>
        <input id="bas" type="date" class="form-control">
      </div>
      <div class="col">
        <label>Bitiş</label>
        <input id="bit" type="date" class="form-control">
      </div>
    </div>

    <button class="btn btn-primary w-100" onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
function gonder(){
    const data = {
        ad: document.getElementById("ad").value,
        izin_turu: document.getElementById("tur").value,
        baslangic: document.getElementById("bas").value,
        bitis: document.getElementById("bit").value,
        aciklama: "Frontend"
    }

    if(!data.ad || !data.baslangic || !data.bitis){
        alert("Lütfen tüm alanları doldurun")
        return
    }

    fetch("http://127.0.0.1:8000/izin-talep", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => {
        if(!res.ok){
            return res.json().then(err => { throw err })
        }
        return res.json()
    })
    .then(() => {
        alert("Başarılı")
        document.getElementById("ad").value = ""
        document.getElementById("bas").value = ""
        document.getElementById("bit").value = ""
    })
    .catch(err => {
        console.error(err)
        alert(err.detail || "Hata oluştu")
    })
}
</script>

</body>
</html>

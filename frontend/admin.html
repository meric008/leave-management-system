<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>İzin Yönetimi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-4 text-center">İzin Talepleri</h3>

    <input id="search" class="form-control mb-3" placeholder="İsme göre ara..." onkeyup="load()">

    <button class="btn btn-secondary mb-3" onclick="load()">Yenile</button>

    <table class="table table-bordered table-hover text-center">
      <thead class="table-dark">
        <tr>
          <th>Ad</th>
          <th>Tür</th>
          <th>Tarih</th>
          <th>Durum</th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
function badge(durum){
    if(durum === "Onaylandı") return `<span class="badge bg-success">${durum}</span>`
    if(durum === "Reddedildi") return `<span class="badge bg-danger">${durum}</span>`
    return `<span class="badge bg-secondary">${durum}</span>`
}

function load(){
    fetch("http://127.0.0.1:8000/izinler?x=" + Date.now())
    .then(res => res.json())
    .then(data => {
        const searchInput = document.getElementById("search")
        const search = searchInput ? searchInput.value.toLowerCase() : ""

        let html = ""

        data
        .filter(i => i.ad.toLowerCase().includes(search))
        .forEach(i => {
            html += `
            <tr>
                <td>${i.ad}</td>
                <td>${i.izin_turu}</td>
                <td>${i.baslangic} - ${i.bitis}</td>
                <td>${badge(i.durum)}</td>
                <td>
                    <button class="btn btn-success btn-sm" onclick="update(${i.id}, 'Onaylandı')">Onayla</button>
                    <button class="btn btn-danger btn-sm" onclick="update(${i.id}, 'Reddedildi')">Reddet</button>
                </td>
            </tr>
            `
        })

        document.getElementById("table").innerHTML = html
    })
}

function update(id, durum){
    fetch(`http://127.0.0.1:8000/izin-durum/${id}?durum=${encodeURIComponent(durum)}`, {
        method: "PUT"
    })
    .then(() => setTimeout(load, 200))
}

window.onload = load
</script>

</body>
</html>
